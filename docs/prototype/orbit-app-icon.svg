<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="ORBIT app icon">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="78%">
      <stop offset="0%" stop-color="#17223e"/>
      <stop offset="52%" stop-color="#0a1126"/>
      <stop offset="100%" stop-color="#04060e"/>
    </radialGradient>
    <radialGradient id="neb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a6f8c" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#2a6f8c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b3601f" stop-opacity=".45"/>
      <stop offset="100%" stop-color="#b3601f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lit" cx="32%" cy="28%" r="84%">
      <stop offset="0%" stop-color="#FFD884"/>
      <stop offset="26%" stop-color="#F0A23E"/>
      <stop offset="52%" stop-color="#9a571f" stop-opacity=".55"/>
      <stop offset="74%" stop-color="#3a2410" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="term" cx="72%" cy="76%" r="62%">
      <stop offset="0%" stop-color="#02040a" stop-opacity=".78"/>
      <stop offset="70%" stop-color="#02040a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="satG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE6B0" stop-opacity=".95"/>
      <stop offset="35%" stop-color="#F5A623" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="50%" stop-color="#FFC65C"/>
      <stop offset="100%" stop-color="#B96E1A"/>
    </linearGradient>
    <clipPath id="pclip"><circle cx="512" cy="512" r="150"/></clipPath>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>

  <!-- deep space -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <ellipse cx="250" cy="240" rx="360" ry="300" fill="url(#neb1)" opacity=".5"/>
  <ellipse cx="820" cy="820" rx="380" ry="320" fill="url(#neb2)" opacity=".5"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="150" r="2"   opacity=".8"/>
    <circle cx="190" cy="90"  r="1.5" opacity=".5"/>
    <circle cx="300" cy="180" r="1.2" opacity=".5"/>
    <circle cx="420" cy="120" r="1.5" opacity=".7"/>
    <circle cx="540" cy="80"  r="2.2" opacity=".9"/>
    <circle cx="640" cy="150" r="1.2" opacity=".5"/>
    <circle cx="720" cy="90"  r="1.6" opacity=".7"/>
    <circle cx="840" cy="160" r="2.2" opacity=".85"/>
    <circle cx="900" cy="260" r="1.4" opacity=".55"/>
    <circle cx="945" cy="430" r="1.7" opacity=".7"/>
    <circle cx="80"  cy="360" r="1.8" opacity=".7"/>
    <circle cx="160" cy="300" r="1"   opacity=".4"/>
    <circle cx="80"  cy="560" r="1.4" opacity=".55"/>
    <circle cx="120" cy="720" r="2"   opacity=".8"/>
    <circle cx="200" cy="820" r="1.5" opacity=".6"/>
    <circle cx="320" cy="905" r="1.3" opacity=".5"/>
    <circle cx="460" cy="930" r="1.7" opacity=".75"/>
    <circle cx="620" cy="945" r="1.3" opacity=".5"/>
    <circle cx="710" cy="900" r="1.7" opacity=".7"/>
    <circle cx="845" cy="860" r="1.2" opacity=".5"/>
    <circle cx="905" cy="700" r="2"   opacity=".8"/>
    <circle cx="945" cy="560" r="1.4" opacity=".55"/>
  </g>

  <!-- corner brackets: the app's HUD signature -->
  <g fill="none" stroke="#F5A623" stroke-width="7" stroke-linecap="round" opacity=".26">
    <path d="M96 184 L96 96 L184 96"/>
    <path d="M928 184 L928 96 L840 96"/>
    <path d="M96 840 L96 928 L184 928"/>
    <path d="M928 840 L928 928 L840 928"/>
  </g>

  <!-- orbit ring -->
  <g transform="rotate(-20 512 512)">
    <ellipse cx="512" cy="512" rx="360" ry="135" fill="none" stroke="url(#ring)" stroke-width="16" opacity=".16" filter="url(#soft)"/>
    <ellipse cx="512" cy="512" rx="360" ry="135" fill="none" stroke="url(#ring)" stroke-width="7"/>
    <ellipse cx="512" cy="512" rx="248" ry="92"  fill="none" stroke="#F5A623" stroke-width="3" opacity=".2"/>
  </g>

  <!-- planet: a dark amber-lit world -->
  <circle cx="512" cy="512" r="150" fill="#080d18"/>
  <g clip-path="url(#pclip)">
    <circle cx="512" cy="512" r="150" fill="url(#lit)"/>
    <g opacity=".1" stroke="#5a3411" fill="none" stroke-width="6">
      <path d="M372 470 Q512 452 652 478"/>
      <path d="M366 520 Q512 506 660 522"/>
      <path d="M380 566 Q512 556 648 566"/>
    </g>
    <circle cx="512" cy="512" r="150" fill="url(#term)"/>
    <ellipse cx="452" cy="452" rx="32" ry="20" fill="#FFEAC0" opacity=".5" filter="url(#soft)"/>
  </g>
  <circle cx="512" cy="512" r="150" fill="none" stroke="#FFC777" stroke-width="2" opacity=".22"/>

  <!-- satellite on the ring -->
  <circle cx="762.6" cy="338.3" r="34" fill="url(#satG)" filter="url(#soft)"/>
  <circle cx="762.6" cy="338.3" r="16" fill="none" stroke="#FFD27A" stroke-width="2.5" opacity=".7"/>
  <circle cx="762.6" cy="338.3" r="9"  fill="#FFEFC9"/>
</svg>
