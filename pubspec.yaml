name: orbit
description: "ORBIT — 宇宙を眺める待ち受けアプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # NASA Images API からの写真メタ取得(補充タイミングのみ。PhotoSource 境界の裏)
  http: ^1.2.2
  # 設定・お気に入り・プールのメタデータ永続化(PoolStore / SettingsStore / CollectionStore 境界)
  shared_preferences: ^2.5.5
  # 画像バイナリのローカルキャッシュ保存先ディレクトリ(ImageStore 境界)
  path_provider: ^2.1.5
  # キャッシュファイル名(URL → 安定したキー)生成
  crypto: ^3.0.6
  # 写真をフォト/ギャラリーに保存(WallpaperService 境界の本番実装)
  gal: ^2.3.1
  # 画面スリープ防止(ScreenWake 境界の本番実装。常時表示の待ち受け用)
  wakelock_plus: ^1.2.8
  # Android のみ壁紙に直接適用(WallpaperService 境界の本番実装)
  async_wallpaper: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # integration smoke test(integration_test/)用
  integration_test:
    sdk: flutter
  # おやすみタイマー / 自動スライド(Timer.periodic)を実時間なしでテストするため
  fake_async: ^1.3.0

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # 初回起動・オフライン用の同梱シード画像(ADR 0004)。
  # 現状はプレースホルダ。詳細・差し替え手順は assets/seed/NOTICE.md。
  assets:
    - assets/seed/

  # プロトタイプ(docs/prototype/orbit_space_wallpaper_app.html)準拠のフォント。
  # 実装フェーズで .ttf を assets/fonts/ に追加し、ライセンス(SIL OFL 等)を同梱したうえで
  # 下のコメントを解除する。未配置のまま有効化すると `flutter build` が失敗するため、
  # フォントファイルを置くまではコメントのままにしておく。
  #
  # fonts:
  #   - family: SpaceGrotesk      # 見出し(--f-display)
  #     fonts:
  #       - asset: assets/fonts/SpaceGrotesk-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
  #         weight: 600
  #   - family: SpaceMono         # HUD / 数字(--f-mono)
  #     fonts:
  #       - asset: assets/fonts/SpaceMono-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/SpaceMono-Bold.ttf
  #         weight: 700
  #   - family: NotoSansJP        # 本文(--f-body)
  #     fonts:
  #       - asset: assets/fonts/NotoSansJP-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/NotoSansJP-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/NotoSansJP-Bold.ttf
  #         weight: 700
